{% extends 'base.html' %}

{% block title %}إنشاء حساب جديد - دفتر كاش (Daftar Cash){% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 40px auto; padding: 20px;">
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-user-plus" style="font-size: 40px; color: var(--accent-blue); margin-bottom: 15px;"></i>
            <h2>إنشاء حساب جديد</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 5px;">انضم إلينا وابدأ بمراقبة رسائل الكاش فوراً</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">اسم المستخدم (Username) *</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="اختر اسم المستخدم" required>
            </div>
            
            <div class="form-group">
                <label for="email">البريد الإلكتروني (Email Address)</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="ادخل بريدك الإلكتروني">
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور (Password) *</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="اختر كلمة مرور قوية" required>
            </div>

            <div class="form-group">
                <label for="password_confirm">تأكيد كلمة المرور *</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="اعد كتابة كلمة المرور" required>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px; padding: 14px;">
                <i class="fa-solid fa-user-check"></i> إنشاء الحساب والبدء
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-secondary);">
            لديك حساب بالفعل؟ <a href="{% url 'login' %}" style="color: var(--accent-purple); text-decoration: none; font-weight: bold;">تسجيل الدخول من هنا</a>
        </div>
    </div>
</div>
{% endblock %}
